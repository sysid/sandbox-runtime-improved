name: Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['**']

jobs:
  integration-tests:
    name: Tests (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-latest
            os: linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            os: linux
          - arch: x86-64
            runner: macos-15-large
            os: macos
          - arch: arm64
            runner: macos-14
            os: macos
          # Windows legs build and smoke-test the srt-win helper
          # binary only (TS integration lands in a later PR).
          - arch: x86-64
            runner: windows-latest
            os: windows
          - arch: arm64
            runner: windows-11-arm
            os: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.os != 'windows'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Bun
        if: matrix.os != 'windows'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      # ─── Windows: srt-win helper binary ─────────────────────────────
      # GitHub-hosted Windows runners run as a member of Administrators
      # with UAC disabled, so NetLocalGroup* and Fwpm* calls succeed
      # without an explicit elevation step.
      - name: Setup Rust (Windows)
        if: matrix.os == 'windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Build srt-win (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          cargo build  --release --manifest-path vendor/srt-win/Cargo.toml
          cargo test   --release --manifest-path vendor/srt-win/Cargo.toml
          cargo clippy --release --manifest-path vendor/srt-win/Cargo.toml --all-targets -- -D warnings

      - name: Smoke-test srt-win group + wfp lifecycle (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = "vendor\srt-win\target\release\srt-win.exe"
          $grp = "srt-ci-test"
          $me  = [Security.Principal.WindowsIdentity]::GetCurrent().User.Value
          Write-Host "current user sid: $me"

          function Run([string[]]$argv) {
            & $exe @argv
            if ($LASTEXITCODE -ne 0) { throw "srt-win $($argv -join ' ') exited $LASTEXITCODE" }
          }
          function J([string[]]$argv) { Run $argv | ConvertFrom-Json }

          # ── group create (idempotent) ─────────────────────────────
          Run @('group','create','--name',$grp)
          Run @('group','create','--name',$grp)   # second call must succeed

          $gs = J @('group','status','--name',$grp)
          Write-Host "group status (--name): $($gs | ConvertTo-Json -Compress)"
          # No logout in CI, so the new group SID is not yet on the
          # runner's token. `created-not-on-token` is the expected
          # state here. (`ready` would also be acceptable on a runner
          # whose image already carries the group.)
          if ($gs.state -notin 'created-not-on-token','ready') {
            throw "unexpected group state: $($gs.state)"
          }
          if (-not $gs.sid -or -not $gs.sid.StartsWith('S-1-')) {
            throw "group status did not return a SID"
          }

          # --group-sid path returns the same SID.
          $gs2 = J @('group','status','--group-sid',$gs.sid)
          if ($gs2.sid -ne $gs.sid) {
            throw "--group-sid status sid mismatch: $($gs2.sid) vs $($gs.sid)"
          }
          # Unmapped SID via --group-sid reports absent (not
          # created-not-on-token).
          $gsBad = J @('group','status','--group-sid','S-1-5-21-1-2-3-9999999')
          if ($gsBad.state -ne 'absent') {
            throw "unmapped --group-sid expected absent, got $($gsBad.state)"
          }

          # ── wfp: pre-install absent ───────────────────────────────
          $pre = J @('wfp','status','--name',$grp)
          if ($pre.state -ne 'absent') {
            throw "pre-install wfp status expected absent, got $($pre.state)"
          }

          # First install via --name + explicit --user-sid.
          Run @('wfp','install','--name',$grp,'--user-sid',$me)
          $ws = J @('wfp','status','--name',$grp,'--user-sid',$me)
          Write-Host "wfp status: $($ws | ConvertTo-Json -Compress)"
          if ($ws.state -ne 'installed') { throw "expected installed, got $($ws.state)" }
          if ($ws.filters -lt 6)         { throw "expected >=6 filters, got $($ws.filters)" }

          # Idempotency: second install via --group-sid path leaves
          # the same filter count.
          Run @('wfp','install','--group-sid',$gs.sid)
          $ws2 = J @('wfp','status','--name',$grp)
          if ($ws2.filters -ne $ws.filters) {
            throw "idempotency: filter count changed $($ws.filters) -> $($ws2.filters)"
          }

          # ── --sublayer-guid isolation ─────────────────────────────
          $altGuid = [guid]::NewGuid().ToString()
          Run @('wfp','install','--name',$grp,'--sublayer-guid',$altGuid)
          $alt = J @('wfp','status','--name',$grp,'--sublayer-guid',$altGuid)
          if ($alt.state -ne 'installed') {
            throw "alt sublayer expected installed, got $($alt.state)"
          }
          # Default sublayer is still its own thing.
          $stillDefault = J @('wfp','status','--name',$grp)
          if ($stillDefault.filters -ne $ws.filters) {
            throw "default sublayer perturbed by alt install"
          }
          Run @('wfp','uninstall','--all','--sublayer-guid',$altGuid)
          $altGone = J @('wfp','status','--name',$grp,'--sublayer-guid',$altGuid)
          if ($altGone.state -ne 'absent') {
            throw "alt sublayer expected absent after uninstall, got $($altGone.state)"
          }

          # ── teardown: per-user uninstall on default sublayer ──────
          Run @('wfp','uninstall')
          $post = J @('wfp','status','--name',$grp)
          if ($post.state -ne 'absent') {
            throw "post-uninstall expected absent, got $($post.state)"
          }

          Run @('group','delete','--name',$grp)
          $gd = J @('group','status','--name',$grp)
          if ($gd.state -ne 'absent') {
            throw "post-delete group expected absent, got $($gd.state)"
          }

      - name: Cleanup srt-win state (Windows)
        if: always() && matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $exe = "vendor\srt-win\target\release\srt-win.exe"
          if (Test-Path $exe) {
            & $exe wfp uninstall --all
            & $exe group delete --name srt-ci-test
          }
          exit 0

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap libseccomp-dev gcc socat ripgrep apparmor-profiles zsh

      - name: Enable unprivileged user namespaces (Linux)
        if: matrix.os == 'linux'
        run: |
          # Ubuntu 24.04+ sets kernel.apparmor_restrict_unprivileged_userns=1 which
          # allows unshare(CLONE_NEWUSER) but grants the new namespace zero
          # capabilities. Disable it so bwrap and apply-seccomp can nest
          # namespaces without needing setuid.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

          # Verify bwrap can create namespaces
          echo "Testing bwrap namespace creation..."
          bwrap --ro-bind / / --unshare-net true && echo "✓ bwrap namespace creation works" || echo "✗ bwrap namespace creation still fails"

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install ripgrep zsh

      - name: Install Node dependencies
        if: matrix.os != 'windows'
        run: npm install

      - name: Build seccomp binaries (Linux)
        if: matrix.os == 'linux'
        run: npm run build:seccomp

      - name: Build project
        if: matrix.os != 'windows'
        run: npm run build

      - name: Run tests
        if: matrix.os != 'windows'
        run: npm test

      - name: Run Node.js fallback tests
        if: matrix.os != 'windows'
        run: node test/utils/which-node-test.mjs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            test-results/
            *.log
          if-no-files-found: ignore

  docker-tests:
    name: Tests (docker / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable unprivileged user namespaces on host
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

      - name: Run srt end-to-end in unprivileged container
        run: |
          docker run --rm \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e SRT_E2E_DOCKER=1 \
            ubuntu:24.04 \
            bash -euo pipefail -c '
              apt-get update -qq
              apt-get install -y -qq bubblewrap socat ripgrep python3 curl ca-certificates unzip gcc libseccomp-dev
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"
              curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
              apt-get install -y -qq nodejs
              npm ci
              npm run build:seccomp
              npm run build
              bun test test/docker-weak-sandbox.test.ts
            '
